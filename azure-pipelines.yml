trigger:
  branches:
    include:
      - main

pr:
  branches:
    include:
      - main
      - feature/*

pool:
  name: Netcup

steps:
  - checkout: self
    persistCredentials: true

  - task: NodeTool@0
    inputs:
      versionSpec: '20.x'
    displayName: 'Check Node.js'

  - script: |
      npm install
    displayName: 'Install dependencies'

  - script: |
      npm test || true
    displayName: 'Run tests'
    continueOnError: true

  - script: |
      echo "Core project - deploy step placeholder"
      echo "Add deployment commands when ready"
    displayName: 'Deploy to Production'
    condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
