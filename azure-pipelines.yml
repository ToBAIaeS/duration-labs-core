# Azure DevOps Pipeline: duration-labs-core
# Self-hosted Agent (Netcup) — Build+Test+Deploy lokal

trigger:
  branches:
    include:
      - main

pr:
  branches:
    include:
      - main
      - feature/*

pool: 'Netcup'

stages:
  - stage: Build
    jobs:
      - job: Build
        steps:
          - script: |
              node --version
              npm --version
            displayName: 'Check Node.js'

          - script: npm ci
            displayName: 'Install dependencies'

          - script: npm test
            displayName: 'Run tests'
            continueOnError: true

  - stage: Deploy
    condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
    dependsOn: Build
    jobs:
      - job: Deploy
        steps:
          - script: |
              echo "Core deploy — customize based on project needs"
            displayName: 'Deploy to Production'
