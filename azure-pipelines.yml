# Azure DevOps Pipeline: duration-labs-core
# PR: Build+Test | main merge: Build+Test+Deploy

trigger:
  branches:
    include:
      - main

pr:
  branches:
    include:
      - main
      - feature/*

pool:
  vmImage: 'ubuntu-latest'

variables:
  NODE_VERSION: '20'

stages:
  - stage: Build
    jobs:
      - job: Build
        steps:
          - task: NodeTool@0
            inputs:
              versionSpec: '$(NODE_VERSION)'
            displayName: 'Install Node.js'

          - script: npm ci
            displayName: 'Install dependencies'

          - script: npm test
            displayName: 'Run tests'
            continueOnError: true

  - stage: Deploy
    condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
    dependsOn: Build
    jobs:
      - job: Deploy
        steps:
          - task: SSH@0
            inputs:
              sshEndpoint: 'tobaiaes-server'
              runOptions: 'inline'
              inline: |
                set -e
                echo "Core deploy — customize based on project needs"
            displayName: 'Deploy to Production via SSH'
